modLoader="javafml"
loaderVersion="${loader_version_range}"
license="MIT"
issueTrackerURL="https://github.com/azubangithub/Origins-Legacy-NeoForged/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="assets/origins/icon.png"
authors="Apace, BluSpring, Azuban"
description='''
Origins: Legacy for NeoForge.
This mod adds several origins with passive abilities to the game, which you can choose from at the beginning of the game.
Unofficial NeoForge port of the Fabric mod.
'''

# Mixin configs
[[mixins]]
config="${mod_id}.mixins.json"

[[mixins]]
config="apoli.mixins.json"

[[mixins]]
config="calio.mixins.json"

# Dependencies
[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
